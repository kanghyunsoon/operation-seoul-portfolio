# 신규 팀원용 백엔드 설정 예시입니다.
# 실제 키와 비밀번호는 application-local.properties에만 입력하고 Git에 올리지 않습니다.
# OperationSeoulApplication이 기본 프로필을 local로 지정하므로 이 파일을 application-local.properties로 복사하면 자동으로 읽힙니다.

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/operation_seoul
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD

# MyBatis / SQL init
# JPA를 사용하지 않으므로 schema.sql로 필요한 테이블을 초기화합니다.
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
mybatis.configuration.map-underscore-to-camel-case=true

# External API keys
gemini.api.key=YOUR_GEMINI_API_KEY
google.vision.key=YOUR_GOOGLE_VISION_API_KEY
tourapi.key=YOUR_TOURAPI_SERVICE_KEY
kakao.rest.api.key=YOUR_KAKAO_REST_API_KEY
tmap.app.key=YOUR_TMAP_APP_KEY

# Auth
# 최소 32자 이상 임의 문자열을 사용합니다. 짧으면 JJWT HMAC 키 생성 단계에서 실패할 수 있습니다.
jwt.secret=CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS

# CORS
# 프론트 개발 서버 주소를 입력합니다. 여러 주소가 필요하면 쉼표로 구분합니다.
app.cors.allowed-origins=http://localhost:5173
